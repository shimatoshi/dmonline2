<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM Card Database</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; }
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; }
        input { padding: 10px; flex: 1; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; background: #007bff; color: white; border: none; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .card { text-align: center; }
        .card img { width: 100%; border-radius: 5px; transition: transform 0.2s; }
        .card img:hover { transform: scale(1.05); }
        .card-name { font-size: 12px; margin-top: 5px; color: #ccc; }
    </style>
</head>
<body>
    <h2>📚 DM カード図鑑 (PC母艦)</h2>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="カード名を入力 (例: ボルシャック)" onkeypress="handleEnter(event)">
        <button onclick="searchCards()">検索 / 収集</button>
    </div>

    <div id="status"></div>
    <div class="grid" id="grid"></div>

    <script>
        // PCのIP (Tailscale)
        const API_BASE = "http://100.92.81.88:8000";

        async function searchCards() {
            const query = document.getElementById('searchInput').value;
            const grid = document.getElementById('grid');
            const status = document.getElementById('status');
            
            status.innerText = "🔍 検索中... (初検索のカードはダウンロードに時間がかかります)";
            grid.innerHTML = "";

            try {
                const res = await fetch(`${API_BASE}/api/cards?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                status.innerText = `✅ ${data.cards.length} 枚見つかりました`;

                data.cards.forEach(card => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <img src="${card.image_url}" loading="lazy">
                        <div class="card-name">${card.name}</div>
                    `;
                    grid.appendChild(div);
                });

            } catch (e) {
                status.innerText = "❌ エラー: " + e.message;
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter') searchCards();
        }
    </script>
</body>
</html>
