<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck Import Tester</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #222; color: #fff; }
        input { width: 80%; padding: 10px; font-size: 16px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; }
        #status { margin-top: 10px; color: #aaa; }
        #result { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
        .card { width: 100px; text-align: center; font-size: 12px; }
        .card img { width: 100%; border-radius: 5px; }
        pre { background: #333; padding: 10px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>

    <h2>🛠 デッキ取り込みテスト (PC母艦)</h2>
    
    <p>Target Backend: <span id="backend-url">http://100.92.81.88:8000</span></p>

    <input type="text" id="deckUrl" placeholder="デッキのURLを貼り付け (ガチまとめ等)" value="https://gachi-matome.com/deckrecipe-detail-dm/?tcgrevo_deck_maker_deck_id=756604ea-3ee0-4d27-b2c1-615e70309c32">
    <button onclick="runImport()">Import Deck</button>

    <div id="status">待機中...</div>

    <h3>Raw JSON Response:</h3>
    <pre id="jsonOutput">No data</pre>

    <h3>Visual Preview:</h3>
    <div id="result"></div>

    <script>
        // PCのIPアドレス (Tailscale)
        const API_BASE = "http://100.92.81.88:8000";

        async function runImport() {
            const urlInput = document.getElementById('deckUrl').value;
            const statusEl = document.getElementById('status');
            const resultEl = document.getElementById('result');
            const jsonEl = document.getElementById('jsonOutput');

            if (!urlInput) {
                alert("URLを入力してください");
                return;
            }

            statusEl.innerText = "⏳ PCサーバーに送信中... (スクレイピングと画像DLに時間がかかります)";
            resultEl.innerHTML = "";
            jsonEl.innerText = "Loading...";

            try {
                const response = await fetch(`${API_BASE}/api/import/deck_url`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: urlInput })
                });

                const data = await response.json();

                // 生JSONを表示
                jsonEl.innerText = JSON.stringify(data, null, 2);

                if (!response.ok) {
                    throw new Error(data.error || "Server Error");
                }

                statusEl.innerText = `✅ 完了! ${data.deck.length}種類のカードを取得`;

                // 画像プレビュー生成
                data.deck.forEach(card => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    
                    // 画像URLがあるかチェック
                    const imgSrc = card.image_url ? card.image_url : "https://dummyimage.com/200x280/555/fff&text=No+Image";

                    div.innerHTML = `
                        <img src="${imgSrc}" onerror="this.src='https://dummyimage.com/200x280/900/fff&text=Error'">
                        <p>${card.name}<br>x${card.count}</p>
                    `;
                    resultEl.appendChild(div);
                });

            } catch (error) {
                console.error(error);
                statusEl.innerText = `❌ エラー発生: ${error.message}`;
                jsonEl.innerText += `\n\n[Check Console for Details]`;
            }
        }
    </script>
</body>
</html>
